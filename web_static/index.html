<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HHR</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">HRR + AMM Language Memory</p>
          <h1>HHR</h1>
        </div>
        <div class="status-strip" id="statusStrip">
          <span class="status-pill">Booting</span>
        </div>
      </header>

      <main class="workspace">
        <section class="pane pane-command">
          <div class="pane-head">
            <h2>Query</h2>
            <span id="routeBadge" class="badge">idle</span>
          </div>
          <form id="queryForm" class="stack">
            <div class="query-grid">
              <input id="querySubject" placeholder="doctor" />
              <input id="queryRelation" placeholder="treats" />
              <input id="queryObject" placeholder="patient" />
            </div>
            <button type="submit" class="primary">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h12M13 6l6 6-6 6"/></svg>
              <span>Run Query</span>
            </button>
          </form>
          <div id="queryResult" class="result-block empty">No answer yet</div>
        </section>

        <section class="pane pane-memory">
          <div class="pane-head">
            <h2>Memory</h2>
            <div class="pane-actions">
              <button id="spinButton" class="icon-button active" title="Pause auto-spin">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14M16 5v14"/></svg>
              </button>
              <button id="refreshButton" class="icon-button" title="Refresh">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6"/></svg>
              </button>
            </div>
          </div>
          <div class="memory-filters">
            <input id="memoryFilter" placeholder="Filter memory" />
            <select id="domainFilter">
              <option value="">All domains</option>
            </select>
            <select id="sourceFilter">
              <option value="">All sources</option>
            </select>
          </div>
          <div id="memoryScene" class="memory-scene">
            <div id="memoryFallback" class="scene-fallback">Loading 3D memory</div>
          </div>
          <div id="nodeInspector" class="node-inspector empty">Select a node</div>
          <div class="metrics-grid" id="metricsGrid"></div>
        </section>

        <section class="pane pane-ingest">
          <div class="pane-head">
            <h2>Ingest</h2>
            <div class="pane-actions">
              <button id="resetDemoButton" type="button" class="secondary">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66M20 4v6h-6"/></svg>
                <span>Reset Demo</span>
              </button>
            </div>
          </div>
          <form id="ingestForm" class="stack">
            <textarea id="ingestText" rows="8" placeholder="Paste text for Gemini-backed fact extraction"></textarea>
            <div class="inline-fields wide">
              <input id="ingestDomain" placeholder="history" />
              <input id="ingestSource" placeholder="web-ui" />
            </div>
            <button type="submit" class="primary">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v5H4zM4 15h16v5H4zM8 9v6M16 9v6"/></svg>
              <span>Ingest Text</span>
            </button>
          </form>
          <div id="ingestResult" class="result-block empty">Ready</div>
          <div id="compositionalCard" class="value-card">
            <strong>Compositional Demo</strong>
            <p>Loading compositional decode state</p>
          </div>
        </section>

        <section class="pane pane-facts">
          <div class="pane-head">
            <h2>Facts</h2>
            <span id="factCountBadge" class="badge">0 facts</span>
          </div>
          <div id="factList" class="fact-list"></div>
        </section>
      </main>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
